<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #6b6b6b; }
  .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text  { fill: #0C447C; }
  .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text  { fill: #085041; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="420" fill="white"/>

<!-- Title -->
<text class="th" x="40" y="38" font-size="15">PlanetScope satellite timeline</text>

<!-- Year axis labels -->
<text class="ts" x="88"  y="72" text-anchor="middle">2014</text>
<text class="ts" x="148" y="72" text-anchor="middle">2016</text>
<text class="ts" x="208" y="72" text-anchor="middle">2018</text>
<text class="ts" x="268" y="72" text-anchor="middle">2020</text>
<text class="ts" x="328" y="72" text-anchor="middle">2022</text>
<text class="ts" x="388" y="72" text-anchor="middle">2024</text>
<text class="ts" x="448" y="72" text-anchor="middle">2026</text>

<!-- Grid lines -->
<line x1="88"  y1="78" x2="88"  y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="148" y1="78" x2="148" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="208" y1="78" x2="208" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="268" y1="78" x2="268" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="328" y1="78" x2="328" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="388" y1="78" x2="388" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>
<line x1="448" y1="78" x2="448" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 4"/>

<!-- Row 1: Dove Classic -->
<text class="th"  x="40" y="126" font-size="13">Dove Classic</text>
<text class="ts"  x="40" y="142">PS2 · 4 bands</text>
<g class="c-blue">
  <rect x="88" y="110" width="234" height="32" rx="6" stroke-width="0.5"/>
  <text class="ts" x="205" y="131" text-anchor="middle" fill="#0C447C">Jul 2014 → Apr 2022</text>
</g>
<circle cx="322" cy="126" r="4" fill="#185FA5"/>

<!-- Row 2: Dove-R -->
<text class="th" x="40" y="206" font-size="13">Dove-R</text>
<text class="ts" x="40" y="222">PS2.SD · 4 bands</text>
<text class="ts" x="40" y="236">Updated Bayer pattern</text>
<g class="c-teal">
  <rect x="244" y="190" width="78" height="32" rx="6" stroke-width="0.5"/>
  <text class="ts" x="283" y="211" text-anchor="middle" fill="#085041">Mar 2019 → Apr 2022</text>
</g>
<circle cx="322" cy="206" r="4" fill="#0F6E56"/>

<!-- Row 3: SuperDove -->
<text class="th" x="40" y="286" font-size="13">SuperDove</text>
<text class="ts" x="40" y="302">PSB.SD · 8 bands</text>
<text class="ts" x="40" y="316">Same filter as PS2.SD</text>
<g class="c-purple">
  <rect x="274" y="270" width="206" height="32" rx="6" stroke-width="0.5"/>
  <text class="ts" x="377" y="291" text-anchor="middle" fill="#3C3489">Mar 2020 → present</text>
</g>
<line x1="480" y1="286" x2="510" y2="286" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Today marker -->
<line x1="448" y1="78" x2="448" y2="310" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3"/>
<rect x="428" y="305" width="40" height="18" rx="4" fill="#E24B4A"/>
<text x="448" y="318" text-anchor="middle" font-size="11" font-weight="500" fill="white">today</text>

<!-- Band count badges -->
<rect x="560" y="113" width="48" height="20" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="584" y="128" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">4 bands</text>
<rect x="560" y="193" width="48" height="20" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="584" y="208" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">4 bands</text>
<rect x="560" y="273" width="48" height="20" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="584" y="288" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">8 bands</text>

<!-- Overlap annotation -->
<line x1="244" y1="157" x2="322" y2="157" stroke="#aaaaaa" stroke-width="0.5"/>
<line x1="244" y1="154" x2="244" y2="160" stroke="#aaaaaa" stroke-width="0.5"/>
<line x1="322" y1="154" x2="322" y2="160" stroke="#aaaaaa" stroke-width="0.5"/>
<text class="ts" x="283" y="173" text-anchor="middle">overlap ~3 yrs</text>

<!-- Divider -->
<line x1="40" y1="345" x2="640" y2="345" stroke="#e0e0e0" stroke-width="0.5"/>

<!-- Legend -->
<text class="ts" x="40"  y="368">Dove Classic retired Apr 2022</text>
<text class="ts" x="40"  y="386">Dove-R retired Apr 2022</text>
<text class="ts" x="300" y="368">SuperDove currently operational (8-band)</text>
<text class="ts" x="300" y="386">All imagery from Jul 2014 onward</text>
</svg>
